<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>html { background-color: #050505; }</style>
    <script>
      (function() {
        try {
          var stored = localStorage.getItem('theme');
          var cls = 'blacklight-dark';
          if (stored === 'blacklight' || stored === 'blacklight-dark') {
            cls = stored;
          } else if (stored === 'system') {
            cls = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'blacklight-dark' : 'blacklight';
          }
          document.documentElement.classList.add(cls);
        } catch(e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" href="/logo-black.png" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap"
    >
<title>Autonoma Agent</title>
