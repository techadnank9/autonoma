services:
  # ──────────────────────────────────────────────
  # Infrastructure
  # ──────────────────────────────────────────────

  postgresql:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: autonoma
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # API Server
  # ──────────────────────────────────────────────

  api:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm db:generate && pnpm api"
    ports:
      - "4000:4000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgresql:5432/autonoma
      REDIS_URL: redis://redis:6379
      API_PORT: "4000"
      NODE_ENV: development
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ──────────────────────────────────────────────
  # Frontend
  # ──────────────────────────────────────────────

  ui:
    image: node:24-alpine
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm ui -- --host 0.0.0.0"
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      VITE_API_URL: http://localhost:4000
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
  node_modules:
